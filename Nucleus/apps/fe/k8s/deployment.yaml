apiVersion: apps/v1
kind: Deployment
metadata:
  name: nucleus-fe-deployment
  namespace: pairbone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nucleus-fe
  template:
    metadata:
      labels:
        app: nucleus-fe
    spec:
      containers:
        - name: nucleus-fe
          image: pairacr.azurecr.io/nucleus-fe:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nucleus-fe-configmap
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
