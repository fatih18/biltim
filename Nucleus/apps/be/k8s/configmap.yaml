apiVersion: v1
kind: ConfigMap
metadata:
  name: nucleus-api-configmap
  namespace: pairbone
data:
  # Environment
  NODE_ENV: 'production'
  
  HOSTNAME: 0.0.0.0
  APP_PORT: '4000'
  APP_ID: 'nucleus-api'
  
  DB_NAME: nucleus
  DATABASE_URL: postgresql://postgres:IeWuAJALrO@postgresql.pairbone.svc.cluster.local:5432/nucleus
  
  IS_MULTI_TENANT: 'false'
  PORT: '4000'
  GODMIN_EMAIL: godmin@nucleus.com
  GODMIN_PASSWORD: q1w2e3r4t5
  GODMIN_FIRST_NAME: 'Hidayet Can'
  GODMIN_LAST_NAME: 'Özcan'  
  SERVE_CLUSTERED: 'false'
  NUCLEUS_APP_ID: 'default_be'

  # JWT Configuration (REQUIRED)
  JWT_SECRET: 'your-secret-key-here'
  JWT_EXPIRES_IN: '30m'
  JWT_ISSUER: 'nucleus-auth'
  JWT_AUDIENCE: ''
  JWT_ALGORITHM: 'HS256'

  # Refresh Token Configuration
  JWT_REFRESH_SECRET: 'your-refresh-secret'
  JWT_REFRESH_EXPIRES_IN: '30d'
  JWT_REFRESH_ISSUER: 'nucleus-auth'
  JWT_REFRESH_AUDIENCE: ''
  JWT_REFRESH_ALGORITHM: 'HS256'

  # Cookie Configuration
  AUTH_V2_ACCESS_COOKIE_NAME: 'nucleus_access_token'
  AUTH_V2_REFRESH_COOKIE_NAME: 'nucleus_refresh_token'
  AUTH_V2_COOKIE_SAME_SITE: 'strict'

  # Session Store (Dapr Redis)
  AUTH_V2_SESSION_STORE: 'statestore-redis'
  AUTH_V2_SESSION_PREFIX: 'session'
  AUTH_V2_SESSION_TTL_SECONDS: '2592000'

  # Password Hashing
  BCRYPT_SALT_ROUNDS: '12'

  # Redis Configuration
  REDIS_HOST: 'redis-master.pairbone.svc.cluster.local'
  REDIS_PORT: '6379'
  REDIS_DB: '0'
  USE_DAPR_FOR_REDIS: 'true'
  
  # OAuth Configuration
  # Backend internal URL - frontend will proxy /oauth/* to this URL
  # NOTE: Use service port (3000), not target port (4000)
  AUTH_API_URL: 'http://nucleus-api-service.pairbone.svc.cluster.local:3000'
