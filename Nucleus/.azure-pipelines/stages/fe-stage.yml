# ============================================
# FRONTEND BUILD & DEPLOY STAGE
# ============================================

stages:
- stage: BuildAndDeployFE
  displayName: '🚀 Frontend Build & Deploy'
  dependsOn: TurboBuild
  condition: succeeded()
  variables:
    feBuiltFromTurbo: $[ stageDependencies.TurboBuild.Build.outputs['buildOutput.feBuilt'] ]
  jobs:
  - job: DebugFE
    displayName: '🔍 Debug FE Stage'
    pool:
      vmImage: 'ubuntu-latest'
    condition: always()
    steps:
    - bash: |
        echo "============================================"
        echo "🚀 STAGE 2: FRONTEND BUILD & DEPLOY"
        echo "============================================"
        echo "TurboBuild output feBuilt: $(feBuiltFromTurbo)"
        if [ "$(feBuiltFromTurbo)" = "true" ]; then
          echo "✅ Condition met: FE artifact available"
        else
          echo "⚠️ Deployment skipped: FE artifact not produced"
        fi
        echo "============================================"
      displayName: '🔍 Debug: FE Stage Started'
  
  - template: ../templates/app-build-deploy.yml
    parameters:
      appName: 'fe'
      appType: 'frontend'
      port: 3000
      artifactName: 'frontend-minimal'
      jobCondition: eq(stageDependencies.TurboBuild.Build.outputs['buildOutput.feBuilt'], 'true')
      hasDaprSubscription: false
