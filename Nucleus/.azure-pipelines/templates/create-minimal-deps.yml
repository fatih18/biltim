# ============================================
# CREATE MINIMAL RUNTIME DEPENDENCIES
# Backend için minimal node_modules oluşturur
# ============================================

parameters:
  - name: appName
    type: string
  - name: pgVersion
    type: string
    default: 'latest'
  - name: drizzleVersion
    type: string
    default: '0.44.7'
  - name: postgresVersion
    type: string
    default: 'latest'
  - name: argon2Version
    type: string
    default: 'latest'
  - name: jwtVersion
    type: string
    default: 'latest'

steps:
- bash: |
    echo "============================================"
    echo "📦 Creating minimal deps for ${{ parameters.appName }}"
    echo "============================================"
    
    mkdir -p minimal-${{ parameters.appName }}-deps
    cd minimal-${{ parameters.appName }}-deps
    
    cat > package.json << EOF
    {
      "name": "${{ parameters.appName }}-runtime-deps",
      "version": "1.0.0",
      "private": true,
      "dependencies": {
        "pg": "${{ parameters.pgVersion }}",
        "drizzle-orm": "${{ parameters.drizzleVersion }}",
        "postgres": "${{ parameters.postgresVersion }}",
        "argon2": "${{ parameters.argon2Version }}",
        "jsonwebtoken": "${{ parameters.jwtVersion }}"
      }
    }
    EOF
    
    echo "📝 package.json created:"
    cat package.json
    echo ""
    
    bun install --production --no-save
    
    echo "✅ Minimal node_modules size:"
    du -sh node_modules
    echo "============================================"
    
    cd ..
  displayName: '📦 Create Minimal Deps: ${{ parameters.appName }}'
