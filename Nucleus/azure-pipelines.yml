# ============================================
# Azure Pipeline - ULTRA OPTIMIZED (Azure Native)
# Mevcut sistem korundu, sadece cache ve parallelization eklendi
# ============================================

trigger:
  branches:
    include:
      - main
      - master

variables:
  containerRegistry: 'pairacr.azurecr.io'
  aksResourceGroup: 'pair-dev-test'
  aksClusterName: 'pairbone-test-az'
  k8sNamespace: 'pairbone'
  dockerRegistryServiceConnection: 'acr-service-connection'
  kubernetesServiceConnection: 'aks-service-connection'
  tag: '$(Build.BuildId)'
  appName: 'nucleus'
  # Desktop agent public endpoints (AKS ingress)
  remoteAgentBackendUrl: 'https://nucleus-api.57-152-73-173.nip.io'
  remoteAgentFrontendUrl: 'https://nucleus-fe.57-152-73-173.nip.io'
  
  # Cache keys
  turboCacheKey: 'turbo-v1|$(Agent.OS)|turbo.json|bun.lock'
  nodeModulesCacheKey: 'node-modules-v1|$(Agent.OS)|bun.lock'

stages:
# ============================================
# STAGE 1 - TURBO BUILD (Cache optimized)
# ============================================
- stage: TurboBuild
  displayName: 'Turbo Build All (FE + BE + shared)'
  jobs:
  - job: Build
    displayName: 'Build with Turbo'
    continueOnError: false
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
      fetchDepth: 1  # Shallow clone - daha hızlı
      clean: false   # Incremental builds

    - bash: |
        echo "============================================"
        echo "🚀 STAGE 1: TURBO BUILD STARTED"
        echo "============================================"
        echo "Build ID: $(Build.BuildId)"
        echo "Source Branch: $(Build.SourceBranch)"
        echo "Agent OS: $(Agent.OS)"
        echo "Working Directory: $(System.DefaultWorkingDirectory)"
        echo "============================================"
      displayName: '🔍 Debug: Build Info'

    # ============================================
    # AZURE PIPELINE CACHE - OPTIMIZED
    # ============================================
    
    # Cache Bun binary
    - task: Cache@2
      displayName: 'Cache Bun binary'
      inputs:
        key: 'bun-v1 | "$(Agent.OS)"'
        path: $(HOME)/.bun
        cacheHitVar: BUN_CACHE_RESTORED

    # Cache Turbo output
    - task: Cache@2
      displayName: 'Cache Turbo builds'
      inputs:
        key: $(turboCacheKey)
        path: .turbo
        restoreKeys: |
          turbo-v1|$(Agent.OS)
        cacheHitVar: TURBO_CACHE_RESTORED

    # Cache Next.js
    - task: Cache@2
      displayName: 'Cache Next.js'
      inputs:
        key: 'nextjs-v1 | "$(Agent.OS)" | apps/fe/package.json'
        path: apps/fe/.next/cache
        restoreKeys: |
          nextjs-v1 | "$(Agent.OS)"

    # Install Bun
    - bash: |
        if [ "$BUN_CACHE_RESTORED" != "true" ]; then
          curl -fsSL https://bun.sh/install | bash
        fi
        echo "##vso[task.prependpath]$HOME/.bun/bin"
      displayName: 'Install Bun'

    # Install dependencies
    - bash: |
        if [ "$NODE_MODULES_CACHE_RESTORED" = "true" ]; then
          echo "✅ node_modules restored from cache"
          bun install --frozen-lockfile --no-save
        else
          echo "📦 Installing dependencies (no cache)..."
          bun install --frozen-lockfile
        fi
      displayName: 'Install dependencies'
      env:
        NODE_MODULES_CACHE_RESTORED: $(NODE_MODULES_CACHE_RESTORED)

    # Turbo build
    - bash: |
        echo "============================================"
        echo "📦 Starting Turbo Build"
        echo "============================================"
        export NEXT_TELEMETRY_DISABLED=1
        export AUTH_API_URL=http://nucleus-api-service.pairbone.svc.cluster.local:3000

        bun run turbo build --output-logs=new-only

        echo ""
        echo "============================================"
        echo "🔍 Detecting Built Apps"
        echo "============================================"

        FE_BUILD_STATUS="false"
        if [ -d "apps/fe/.next/standalone" ]; then
          echo "✅ FE: Built successfully"
          FE_BUILD_STATUS="true"
        else
          echo "❌ FE: Not built or build failed"
        fi
        echo "##vso[task.setvariable variable=feBuilt;isOutput=true]$FE_BUILD_STATUS"
        echo "##vso[task.logissue type=warning]feBuilt=$FE_BUILD_STATUS"

        echo "##vso[task.setvariable variable=feChanged;isOutput=true]false"
        FE_CHANGED_FILES=$(git show --pretty='' --name-only HEAD | grep '^apps/fe/' || true)
        if [ -n "$FE_CHANGED_FILES" ]; then
          echo "🔁 FE changes detected in commit:"
          echo "$FE_CHANGED_FILES"
          echo "##vso[task.setvariable variable=feChanged;isOutput=true]true"
          echo "##vso[task.logissue type=warning]feChanged=true"
        else
          echo "ℹ️ No FE changes detected in commit"
          echo "##vso[task.logissue type=warning]feChanged=false"
        fi

        echo "============================================"
        echo "📁 Debug: apps/fe directory contents"
        echo "============================================"
        ls -la apps/fe || true
        echo "---"
        if [ -d "apps/fe/.next" ]; then
          echo "apps/fe/.next structure (max depth 2):"
          find apps/fe/.next -maxdepth 2 -type d | sort
        else
          echo "apps/fe/.next directory NOT found"
        fi
        echo "============================================"

        if [ -d "apps/be/src" ]; then
          echo "✅ BE: Source found"
          echo "##vso[task.setvariable variable=beBuilt;isOutput=true]true"
        else
          echo "❌ BE: Source not found"
          echo "##vso[task.setvariable variable=beBuilt;isOutput=true]false"
        fi

      
        
        echo "============================================"
      displayName: '📦 Turbo Build (FE + BE )'
      name: buildOutput
      env:
        NEXT_TELEMETRY_DISABLED: 1

    # ============================================
    # COMPILE & PREPARE BACKEND
    # ============================================
    - template: .azure-pipelines/templates/compile-backend-binary.yml
      parameters:
        appName: 'be'
        appPath: 'apps'
        externalDeps:
          - pg
          - drizzle-orm
          - postgres
          - argon2
          - jsonwebtoken

    - template: .azure-pipelines/templates/create-minimal-deps.yml
      parameters:
        appName: 'be'
        pgVersion: 'latest'
        drizzleVersion: '0.44.7'
        postgresVersion: 'latest'
        argon2Version: 'latest'
        jwtVersion: 'latest'

    # ============================================
    # DESKTOP AGENT DISTRIBUTION (AKS)
    # ============================================
    - bash: |
        echo "============================================"
        echo "🖥️ Building Desktop Agent Distribution for AKS"
        echo "============================================"
        echo "REMOTE_AGENT_BACKEND_URL=$REMOTE_AGENT_BACKEND_URL"
        echo "REMOTE_AGENT_FRONTEND_URL=$REMOTE_AGENT_FRONTEND_URL"

        bun run build:desktop:dist
      displayName: '🖥️ Build Desktop Agent Distribution'
      env:
        REMOTE_AGENT_BACKEND_URL: $(remoteAgentBackendUrl)
        REMOTE_AGENT_FRONTEND_URL: $(remoteAgentFrontendUrl)


    # Package frontend - AYNEN KORUNDU (tüm dependency handling'i aynen)
    - bash: |
        echo "##vso[task.setvariable variable=frontendReady;isOutput=true]false"
        echo "============================================"
        echo "📦 Packaging Frontend"
        echo "============================================"
        ARTIFACT_DIR="$(Build.ArtifactStagingDirectory)/frontend-minimal"
        mkdir -p "$ARTIFACT_DIR"
        
        if [ -d "apps/fe/.next/standalone" ]; then
          echo "Copying Next.js standalone build (workspace packages already traced & included)..."
          
          # Copy standalone build with rsync - handles broken symlinks gracefully
          rsync -a --copy-links --ignore-errors apps/fe/.next/standalone/ "$ARTIFACT_DIR/" 2>/dev/null || true
          
          # Copy static assets
          mkdir -p "$ARTIFACT_DIR/apps/fe/.next"
          rsync -a --copy-links --ignore-errors apps/fe/.next/static/ "$ARTIFACT_DIR/apps/fe/.next/static/" 2>/dev/null || true
          
          # Copy public folder if exists
          if [ -d "apps/fe/public" ]; then
            rsync -a --copy-links --ignore-errors apps/fe/public/ "$ARTIFACT_DIR/apps/fe/public/" 2>/dev/null || true
          fi
          
          echo "✓ Standalone build copied (broken symlinks ignored)"
          
          echo ""
          echo "=== Ensuring Next.js Dependencies ==="
          
          mkdir -p "$ARTIFACT_DIR/apps/fe/node_modules"
          
          # Next.js'in TÜM dependencies'ini kopyala (Bun cache'den)
          if [ -d "$ARTIFACT_DIR/node_modules/.bun" ]; then
            echo "Copying ALL Next.js dependencies from Bun cache..."
            
            find "$ARTIFACT_DIR/node_modules/.bun" -type d -path "*/node_modules/*" -maxdepth 4 2>/dev/null | while read SRC; do
              PKG_NAME=$(basename "$SRC")
              PARENT=$(basename "$(dirname "$SRC")")
              
              if [ "$PARENT" = "node_modules" ]; then
                TARGET="$ARTIFACT_DIR/apps/fe/node_modules/$PKG_NAME"
              else
                TARGET="$ARTIFACT_DIR/apps/fe/node_modules/$PARENT/$PKG_NAME"
              fi
              
              if [ ! -d "$TARGET" ] && [ -d "$SRC" ]; then
                mkdir -p "$(dirname "$TARGET")"
                cp -rL "$SRC" "$TARGET" 2>/dev/null || true
              fi
            done
            
            echo "✓ Bulk copy completed"
          else
            echo "⚠️  Bun cache not found, using fallback for critical packages..."
            
            CRITICAL_PACKAGES=(
              "styled-jsx"
              "@next/env"
              "@next/swc-linux-x64-gnu"
              "@next/swc-linux-x64-musl"
              "@swc/helpers"
              "@swc/counter"
            )
            
            for pkg in "${CRITICAL_PACKAGES[@]}"; do
              TARGET="$ARTIFACT_DIR/apps/fe/node_modules/$pkg"
              
              if [ -d "$TARGET" ]; then
                continue
              fi
              
              if [ -d "node_modules/$pkg" ]; then
                mkdir -p "$(dirname "$TARGET")"
                cp -rL "node_modules/$pkg" "$TARGET" 2>/dev/null || true
              else
                BUN_PKG=$(find node_modules/.bun -type d -path "*/node_modules/$pkg" 2>/dev/null | head -1)
                if [ -n "$BUN_PKG" ] && [ -d "$BUN_PKG" ]; then
                  mkdir -p "$(dirname "$TARGET")"
                  cp -rL "$BUN_PKG" "$TARGET" 2>/dev/null || true
                fi
              fi
            done
          fi
          
          # VERIFY - Next.js critical dependencies
          echo ""
          echo "=== Verifying Critical Files ==="
          
          MISSING=0
          
          if [ ! -f "$ARTIFACT_DIR/apps/fe/node_modules/styled-jsx/package.json" ]; then
            echo "  ❌ styled-jsx/package.json NOT FOUND"
            MISSING=$((MISSING + 1))
          else
            echo "  ✅ styled-jsx verified"
          fi
          
          if [ ! -f "$ARTIFACT_DIR/apps/fe/node_modules/@swc/helpers/package.json" ]; then
            echo "  ❌ @swc/helpers/package.json NOT FOUND"
            MISSING=$((MISSING + 1))
          else
            echo "  ✅ @swc/helpers verified"
          fi
          
          if [ ! -f "$ARTIFACT_DIR/apps/fe/node_modules/@next/env/package.json" ]; then
            echo "  ❌ @next/env/package.json NOT FOUND"
            MISSING=$((MISSING + 1))
          else
            echo "  ✅ @next/env verified"
          fi
          
          PKG_COUNT=$(find "$ARTIFACT_DIR/apps/fe/node_modules" -name "package.json" 2>/dev/null | wc -l)
          echo "  📦 Total packages in apps/fe/node_modules: $PKG_COUNT"
          
          if [ -d "$ARTIFACT_DIR/packages" ] || [ -d "$ARTIFACT_DIR/apps/fe/node_modules/@monorepo" ]; then
            echo "  ✅ Workspace packages found"
          else
            echo "  ⚠️ Workspace packages NOT found"
          fi

          echo "##vso[task.setvariable variable=frontendPackaged;isOutput=true]true"
          
          if [ $MISSING -gt 0 ]; then
            echo ""
            echo "❌ CRITICAL ERROR: $MISSING required packages missing!"
            echo "Searching in build environment:"
            find . -type d -name "styled-jsx" -o -name "@swc" 2>/dev/null | grep node_modules | head -10
            exit 1
          fi
          
          echo ""
          echo "=== Frontend Artifact Summary ==="
          echo "Total size:"
          du -sh "$ARTIFACT_DIR"
          echo ""
          echo "Traced workspace packages:"
          ls -la "$ARTIFACT_DIR/packages/" 2>/dev/null | head -3 || echo "  packages/ not in root (might be in apps/fe/)"
          ls -la "$ARTIFACT_DIR/utilities/" 2>/dev/null | head -3 || echo "  utilities/ not in root"
          echo ""
          echo "Critical Next.js packages:"
          ls -d "$ARTIFACT_DIR/node_modules/styled-jsx" 2>/dev/null && echo "  ✓ styled-jsx" || echo "  ✗ styled-jsx NOT FOUND"
          ls -d "$ARTIFACT_DIR/apps/fe/node_modules/styled-jsx" 2>/dev/null && echo "  ✓ apps/fe styled-jsx" || true
        else
          echo "❌ ERROR: apps/fe/.next/standalone not found!"
          exit 1
        fi
        echo "============================================"
        echo "##vso[task.setvariable variable=frontendReady;isOutput=true]true"
      displayName: '📦 Package Frontend (Ultra Minimal + Critical Deps)'
      name: packageFrontend
      condition: eq(variables['buildOutput.feBuilt'], 'true')

   
    # ============================================
    # PACKAGE ARTIFACTS
    # ============================================
    - template: .azure-pipelines/templates/package-backend-artifact.yml
      parameters:
        appName: 'be'

   

    # Publish artifacts
    - task: PublishPipelineArtifact@1
      displayName: 'Publish frontend minimal'
      condition: eq(variables['buildOutput.feBuilt'], 'true')
      inputs:
        targetPath: $(Build.ArtifactStagingDirectory)/frontend-minimal
        artifact: 'frontend-minimal'
        publishLocation: 'pipeline'
        

    - task: PublishPipelineArtifact@1
      displayName: 'Publish backend minimal'
      condition: eq(variables['buildOutput.beBuilt'], 'true')
      inputs:
        targetPath: $(Build.ArtifactStagingDirectory)/be-minimal
        artifact: 'be-minimal'
        publishLocation: 'pipeline'

   


# ============================================
# APP STAGES - Modüler stage dosyaları
# Her app kendi dosyasında (debug + deploy)
# ============================================

# Frontend
- template: .azure-pipelines/stages/fe-stage.yml

# Backend
- template: .azure-pipelines/stages/be-stage.yml


# ============================================
# YENİ UYGULAMA EKLEMEK İÇİN:
# 
# 1. Yeni stage dosyası oluştur:
#    .azure-pipelines/stages/my-app-stage.yml
# 
# 2. Yukarıdaki listede çağır:
#    - template: .azure-pipelines/stages/my-app-stage.yml
#
# 3. TurboBuild'e compile/package ekle
# 
# Detaylı kılavuz: .azure-pipelines/NEW_APP_GUIDE.md
# ============================================